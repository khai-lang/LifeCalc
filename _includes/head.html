<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
  {% if page.title %}
    {{ page.title }} | LifeCalc
  {% else %}
    {{ site.title | default: "LifeCalc" }}
  {% endif %}
</title>

<meta property="og:type" content="website">
<meta property="og:site_name" content="LifeCalc">

<meta property="og:title"
      content="{% if page.title %}{{ page.title }} | LifeCalc{% else %}LifeCalc | 생활·세금·건강 계산기{% endif %}">

<meta property="og:description"
      content="{% if page.description %}{{ page.description }}{% else %}생활, 급여, 세금, 건강 계산기를 한곳에 모은 LifeCalc{% endif %}">

<meta property="og:url" content="{{ page.url | absolute_url }}">

{% if page.og_image %}
<meta property="og:image" content="{{ page.og_image | absolute_url }}">
{% else %}
<meta property="og:image" content="{{ '/images/og-lifecalc.png' | absolute_url }}">
{% endif %}

<meta name="description" content="{{ page.description | default: site.description }}">

<link rel="canonical" href="{{ page.url | absolute_url }}">

{% seo %}

<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

<style>
  /* 1. 최상위 헤더 배경을 네이비(#0b5a7a)로 전체 화면 가득 채우기 */
  header, .site-header {
    width: 100% !important;
    background: #0b5a7a !important;
    display: block !important;
    border: none !important;
    box-shadow: none !important;
  }

  /* 2. [핵심] 사이드 부분(광고 영역)만큼 양옆에 강제로 넉넉한 여백(Padding)을 부여 */
  .header-wrap {
    display: flex !important;
    justify-content: space-between !important; /* 로고와 메뉴를 정렬된 구역의 양끝으로 배정 */
    align-items: center !important;
    
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 auto !important;
    background: #0b5a7a !important;
    
    /* ★ 수치 조정 구역: 
       화면이 클 때 양옆 사이드 광고판 라인과 정렬을 맞추기 위해 
       좌우 패딩 여백을 12%~15% 정도로 넉넉하게 밀어 넣습니다.
    */
    padding: 14px 12% !important; 
    box-sizing: border-box !important;
  }

  /* 3. 모바일 화면(940px 이하)이 되면 양옆 여백을 다시 기본값으로 복구 */
  @media (max-width: 940px) {
    .header-wrap {
      padding: 12px 16px !important;
    }
  }

  /* 4. 자식 요소 크기 꼬임 방지 */
  .header-wrap .logo,
  .header-wrap .site-nav {
    flex: none !important;
    width: auto !important;
  }
</style>

<style>
  /* ★ 모든 링크 밑줄 강제 제거 */
  a { text-decoration: none !important; }

  /* ★ [핵심] 헤더 영역 전체 가운데 정렬 및 간격 60px 강제 고정 */
  .header-wrap {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important; /* 전체 가운데 정렬 */
    gap: 60px !important;               /* 로고와 메뉴 사이 여백 확대 */
  }

  /* 메뉴바가 우측으로 밀리는 버그 방지 */
  .header-wrap .site-nav,
  .header-wrap .nav-ul {
    margin-left: 0 !important;
    margin-right: 0 !important;
    flex-grow: 0 !important;
  }

  /* ★ 전체 페이지 배경 살구톤 보정 */
  body { background: #fff7ef !important; }

  /* ★ 드롭다운 메뉴 배경 강제 보정 */
  .drop .menu {
    background: #fff8f1 !important;
    border: 1px solid #f3e6db !important;
  }

  /* ★ 박스/카드 배경 강제 보정 */
  .card, .promo-card, .box {
    background: #fff3e8 !important;
    border: 1px solid #f3e6db !important;
  }

  /* ★ 푸터 강제 복구 */
  footer {
    background: #fcf9f6 !important;
    color: #777 !important;
    padding: 20px 0 !important;
    text-align: center !important;
  }
</style>
