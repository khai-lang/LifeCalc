---
layout: none
---

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo %}

  <!-- Canonical -->
  <link rel="canonical" href="{{ page.url | absolute_url }}"/>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css?v=20250201' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3758454239921831" crossorigin="anonymous"></script>

  <!-- PAGE SECTION -->
  <script>
    window.PAGE_SECTION = "{{ page.section | default: page.url | split:'/' | slice:1 | first | default:'home' }}";
  </script>

  <style>
    /* ================================
       GLOBAL VARIABLES
    ================================= */
    :root{
      --brand:#0b4c74;
      --brand-ink:#fff;
      --accent:#ff6a00;

      --text:#222;
      --muted:#6b7280;
      --bg:#f5f7fa;
      --card:#fff;
      --line:#e6ebf0;

      --max:1320px;
      --nav-h:72px;
      --radius:14px;
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;

      /* 🔥 전체 페이지를 세로 플렉스 컨테이너로 지정 → sticky footer 구현 */
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    a{text-decoration:none;color:inherit}
    *{box-sizing:border-box}

    /* ================================
       HEADER
    ================================= */
    header{
      background:var(--brand);
      color:var(--brand-ink);
      height:var(--nav-h);
      display:flex;
      align-items:center;
      position:sticky;
      top:0;
      z-index:1000;
      box-shadow:0 1px 0 rgba(0,0,0,.08);
    }
    .header-wrap{
      max-width:var(--max);
      width:100%;
      margin:0 auto;
      display:flex;
      align-items:center;
      padding:0 20px;
      gap:16px;
    }

    /* ================================
       NAVIGATION
    ================================= */
    .nav-ul{
      list-style:none;
      margin:0;
      padding:0;
      display:flex;
      gap:18px;
    }

    .nav-parent, .nav-ul>li>a{
      padding:12px 14px;
      border-radius:10px;
      color:#fff;
      cursor:pointer;
      white-space:nowrap;
    }
    .nav-ul>li>a:hover,
    .nav-parent:hover{
      background:rgba(255,255,255,.12);
    }

    /* ----- 드롭다운 메뉴 ----- */
    .drop{position:relative}
    .drop .menu{
      position:absolute;
      top:calc(100% + 8px);
      left:0;
      background:#fff8f1; /* 연살구색 */
      border:1px solid #f3e6db;
      border-radius:12px;
      padding:10px;
      min-width:240px;
      display:none;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      z-index:1200;
    }
    .drop.open .menu{display:block}

    .menu a{
      display:block;
      padding:12px;
      margin:4px 0;
      background:#fff;
      border-radius:10px;
      border:1px solid #efe2d7;
      font-size:16px;
      transition:0.15s;
    }
    .menu a:hover{
      background:#ffeedd;
      border-color:#f0d4c0;
    }

    /* ================================
       MAIN CONTENT WRAPPER
    ================================= */

    /* 🔥 flex:1 → 본문 영역이 남는 공간 채움 → 푸터를 아래로 밀어냄 */
    main{
      flex:1;
      width:100%;
      display:flex;
      justify-content:center;
    }

    /* 3단 레이아웃 */
    .wrap--with-rail{
      display:grid;
      grid-template-columns:160px minmax(0,880px) 220px;
      gap:20px;
      width:100%;
      max-width:var(--max);
      padding:20px 12px;
      align-items:start;
    }

    .left-rail,
    .right-rail{
      position:sticky;
      top:96px;
    }

    @media(max-width:860px){
      .wrap--with-rail{
        grid-template-columns:1fr;
      }
      .left-rail,.right-rail{display:none!important}
    }

    /* ================================
       FOOTER (화면 맨아래 고정)
    ================================= */
    footer.site-footer{
      width:100%;
      background:#fff;
      border-top:1px solid #e6ebf0;
      padding:18px 0;
      text-align:center;
      color:var(--muted);
      margin-top:40px;
    }
    .footer-inner{max-width:var(--max);margin:0 auto}

  (메인 페이지 넓이 수정 시 추가>
   .main-content,
   .prose{
    width:100%;
    max-width:none;
    min-width:0;
   }  
    
  </style>
</head>

<body>
<header>
  {% include header.html %}
</header>
<main>
  <div class="wrap wrap--with-rail">

    <!-- LEFT RAIL -->
    <aside class="left-rail">
      {% include ads/left-rail.html %}
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <h1 class="page-title">{{ page.title }}</h1>
      <div class="prose">
        {{ content }}
      </div>
    </div>

    <!-- RIGHT RAIL -->
    <aside class="right-rail">
      {% include promo-tip-guide.html %}
      {% include ads/right-rail.html %}
    </aside>

  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    © {{ "now" | date: "%Y" }} LifeCalc · All rights reserved.
  </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const drops = document.querySelectorAll('.drop');
  const navToggle = document.getElementById('nav-toggle');

  // 초기화
  drops.forEach(d => d.classList.remove('open'));

  drops.forEach(drop => {
    const btn = drop.querySelector('.nav-parent');
    if (!btn) return;

    btn.addEventListener('click', function (e) {
      if (window.innerWidth > 940) return; // 데스크톱은 클릭 제어 안 함

      e.preventDefault();
      e.stopPropagation();

      drops.forEach(other => {
        if (other !== drop) other.classList.remove('open');
      });

      drop.classList.toggle('open');
    });
  });

  // 메뉴 바깥 클릭 시 닫기
  document.addEventListener('click', function (e) {
    if (!e.target.closest('.site-nav')) {
      drops.forEach(d => d.classList.remove('open'));
    }
  });

  // 화면 커지면 모바일 열린 메뉴 초기화
  window.addEventListener('resize', function () {
    if (window.innerWidth > 940) {
      drops.forEach(d => d.classList.remove('open'));
      if (navToggle) navToggle.checked = false;
    }
  });
});
</script>

{% include calc-common.html %}

</body>
</html>
