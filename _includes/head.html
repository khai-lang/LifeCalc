<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
  {% if page.title %}
    {{ page.title }} | LifeCalc
  {% else %}
    {{ site.title | default: "LifeCalc" }}
  {% endif %}
</title>

<meta property="og:type" content="website">
<meta property="og:site_name" content="LifeCalc">

<meta property="og:title"
      content="{% if page.title %}{{ page.title }} | LifeCalc{% else %}LifeCalc | 생활·세금·건강 계산기{% endif %}">

<meta property="og:description"
      content="{% if page.description %}{{ page.description }}{% else %}생활, 급여, 세금, 건강 계산기를 한곳에 모은 LifeCalc{% endif %}">

<meta property="og:url" content="{{ page.url | absolute_url }}">

{% if page.og_image %}
<meta property="og:image" content="{{ page.og_image | absolute_url }}">
{% else %}
<meta property="og:image" content="{{ '/images/og-lifecalc.png' | absolute_url }}">
{% endif %}

<meta name="description" content="{{ page.description | default: site.description }}">

<link rel="canonical" href="{{ page.url | absolute_url }}">

{% seo %}

<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

<style>
  /* 1. 최상위 헤더 배경을 네이비로 채우고 중앙 축 고정 */
  header, .site-header {
    width: 100% !important;
    background: #0b5a7a !important;
    display: flex !important;
    justify-content: center !important; /* 무조건 브라우저 정중앙으로 모으기 */
    align-items: center !important;
    border: none !important;
    box-shadow: none !important;
  }

  /* 2. [핵심] 양옆 광고 공간만큼 여백을 확보하고 본문 크기에 맞추는 세팅 */
  .header-wrap {
    display: flex !important;
    justify-content: center !important; /* 로고와 메뉴를 가운데로 옹기종기 모음 */
    align-items: center !important;
    
    /* 본문(880px)과 로고/메뉴 사이의 균형을 위해 최대 너비를 제한합니다 */
    max-width: 1100px !important; 
    width: 100% !important;
    margin: 0 auto !important;
    padding: 14px 20px !important;
    background: #0b5a7a !important;
    
    /* 로고와 메뉴 사이의 간격 (원하시는 대로 숫자를 늘리거나 줄이셔도 됩니다) */
    gap: 80px !important; 
    float: none !important;
  }

  /* 3. 데스크톱에서 가로폭이 찌그러지는 현상 방지 */
  .header-wrap .logo,
  .header-wrap .site-nav {
    flex: none !important;
    width: auto !important;
  }

  /* 4. 모바일 화면(940px 이하) 대응 */
  @media (max-width: 940px) {
    .header-wrap {
      justify-content: space-between !important; /* 모바일은 원래대로 양끝 정렬 */
      gap: 0 !important;
      padding: 12px 16px !important;
    }
  }
</style>

<style>
  /* ★ 모든 링크 밑줄 강제 제거 */
  a { text-decoration: none !important; }

  /* ★ [핵심] 헤더 영역 전체 가운데 정렬 및 간격 60px 강제 고정 */
  .header-wrap {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important; /* 전체 가운데 정렬 */
    gap: 60px !important;               /* 로고와 메뉴 사이 여백 확대 */
  }

  /* 메뉴바가 우측으로 밀리는 버그 방지 */
  .header-wrap .site-nav,
  .header-wrap .nav-ul {
    margin-left: 0 !important;
    margin-right: 0 !important;
    flex-grow: 0 !important;
  }

  /* ★ 전체 페이지 배경 살구톤 보정 */
  body { background: #fff7ef !important; }

  /* ★ 드롭다운 메뉴 배경 강제 보정 */
  .drop .menu {
    background: #fff8f1 !important;
    border: 1px solid #f3e6db !important;
  }

  /* ★ 박스/카드 배경 강제 보정 */
  .card, .promo-card, .box {
    background: #fff3e8 !important;
    border: 1px solid #f3e6db !important;
  }

  /* ★ 푸터 강제 복구 */
  footer {
    background: #fcf9f6 !important;
    color: #777 !important;
    padding: 20px 0 !important;
    text-align: center !important;
  }
</style>
